<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="loading-screen"><h2>Menghubungkan ke Game...</h2></div>

        <div id="main-content" class="hidden">
            <div id="player-panel">
                <input type="text" id="player-name" placeholder="Masukkan nama kamu...">
                <button onclick="registerPlayer()" class="state-btn">Join Game</button>
            </div>

            <div id="players-list-area">
                <h3>Daftar Pemain:</h3>
                <ul id="players-ul"></ul>
            </div>

            <!-- Panel Khusus MC -->
            <div id="mc-controls" class="hidden" style="margin-top: 20px; border-top: 2px solid #ccc; padding-top: 20px;">
                <h3>Panel Kontrol MC</h3>
                <button onclick="startGame()" style="background: #28a745; color: white; padding: 10px;">Mulai (Acak Peran)</button>
                <button onclick="resetGame()" style="background: #dc3545; color: white; padding: 10px;">RESET SEMUA</button>
            </div>

            <!-- Area Tampilan Peran Pemain -->
            <div id="role-display" style="margin-top: 20px; font-weight: bold; font-size: 1.2em;"></div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
