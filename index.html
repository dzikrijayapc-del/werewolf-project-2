<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="loading-screen"><h2>Menghubungkan ke Game...</h2></div>

        <div id="main-content" class="hidden">
            <!-- Form Pendaftaran (Hanya untuk pemain biasa) -->
            <div id="player-panel">
                <input type="text" id="player-name" placeholder="Masukkan nama kamu...">
                <button onclick="registerPlayer()" class="state-btn btn-night">Join Game</button>
            </div>

            <!-- Daftar Pemain -->
            <div id="players-list-area">
                <h3>Daftar Pemain:</h3>
                <ul id="players-ul"></ul>
            </div>

            <!-- Panel MC (Hanya muncul jika link pakai ?role=mc) -->
            <div id="mc-controls" class="hidden mc-panel" style="margin-top: 30px; border: 2px solid orange; padding: 10px;">
                <h3>Panel Kontrol MC (Admin)</h3>
                <button onclick="startGame()" class="state-btn" style="background: #ff9500;">Acak Peran & Mulai</button>
                <button onclick="resetGame()" class="state-btn" style="background: #ff3b30;">RESET SEMUA</button>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
