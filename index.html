<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Werewolf Game Pro</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; }
        .hidden { display: none !important; }
        .card { background: #34495e; padding: 15px; margin: 10px; border-radius: 10px; }
        button { padding: 10px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <h1 id="status-text">Menunggu Game...</h1>
        <div id="player-panel">
            <input type="text" id="player-name" placeholder="Nama Anda...">
            <button onclick="registerPlayer()">Join</button>
        </div>
        
        <div id="game-ui" class="hidden">
            <div class="card" id="my-role-card"></div>
            <div id="action-panel" class="hidden">
                <h3>Aksi Malam:</h3>
                <div id="target-buttons"></div>
            </div>
            <ul id="players-list" style="list-style: none;"></ul>
        </div>

        <div id="mc-controls" class="hidden">
            <button onclick="startGame()">Mulai Game</button>
            <button onclick="resetGame()" style="background:red;">Reset</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
