<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Werewolf Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="loading-screen"><h2>Menghubungkan...</h2></div>

        <div id="main-content" class="hidden">
            <!-- Form Pendaftaran -->
            <div id="player-panel">
                <input type="text" id="player-name" placeholder="Masukkan nama kamu...">
                <button onclick="registerPlayer()" class="state-btn btn-night">Join Game</button>
            </div>

            <!-- Daftar Pemain -->
            <div id="players-list-area">
                <h3>Daftar Pemain:</h3>
                <ul id="players-ul"></ul>
            </div>

            <!-- Panel Reset (MC) -->
            <div class="mc-panel" style="margin-top: 30px;">
                <button onclick="resetGame()" class="state-btn" style="background: #ff3b30;">RESET SEMUA (Mulai dari Awal)</button>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
